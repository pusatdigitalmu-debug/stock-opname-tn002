<script>
var currentUser = '';
var currentRole = 'Staff';
var isAdmin = false;
var allItemsData = [];

window.onload = function() {
  startApp();
};

function startApp() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(email) {
      currentUser = email || '';
      document.getElementById('userEmail').innerHTML = currentUser;
      getRole();
    })
    .withFailureHandler(function() {
      document.getElementById('userEmail').innerHTML = 'Unknown';
      document.getElementById('userRole').innerHTML = 'Staff';
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .getCurrentUserEmail();
}

function getRole() {
  google.script.run
    .withSuccessHandler(function(role) {
      currentRole = role || 'Staff';
      isAdmin = (currentRole === 'Admin');
      document.getElementById('userRole').innerHTML = currentRole;
      
      if (!isAdmin) {
        var elems = document.getElementsByClassName('admin-only');
        for (var i = 0; i < elems.length; i++) {
          elems[i].style.display = 'none';
        }
      }
      
      loadFilters();
    })
    .withFailureHandler(function() {
      document.getElementById('userRole').innerHTML = 'Staff';
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .getCurrentUserRole();
}

function loadFilters() {
  google.script.run
    .withSuccessHandler(function(opts) {
      if (opts && opts.locations) {
        fillDropdown('filterLocationInput', opts.locations, 'Semua Lokasi');
        fillDropdown('filterAllLocation', opts.locations, 'Semua Lokasi');
        fillDropdown('reportLocation', opts.locations, 'Semua Lokasi');
      }
      if (opts && opts.brands) {
        fillDropdown('filterAllBrand', opts.brands, 'Semua Brand');
        fillDropdown('reportBrand', opts.brands, 'Semua Brand');
      }
      if (opts && opts.categories) {
        fillDropdown('filterAllCategory', opts.categories, 'Semua Kategori');
        fillDropdown('reportCategory', opts.categories, 'Semua Kategori');
      }
      loadDashboard();
    })
    .withFailureHandler(function() {
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .getFilterOptions();
}

function fillDropdown(id, items, defaultText) {
  var sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '<option value="">' + defaultText + '</option>';
  if (items) {
    for (var i = 0; i < items.length; i++) {
      sel.innerHTML += '<option value="' + items[i] + '">' + items[i] + '</option>';
    }
  }
}

function loadDashboard() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (data) {
        document.getElementById('totalItems').innerHTML = data.totalItems || 0;
        document.getElementById('countedItems').innerHTML = data.countedItems || 0;
        document.getElementById('matchItems').innerHTML = data.matchItems || 0;
        document.getElementById('selisihItems').innerHTML = data.selisihItems || 0;
        
        var pct = data.percentage || 0;
        var bar = document.getElementById('progressBar');
        if (bar) bar.value = pct;
        var label = document.getElementById('progressBarLabel');
        if (label) label.innerHTML = pct + '%';
        
        showLocationStats(data.locationStats || {});
        if (isAdmin) showStaffStats(data.staffStats || {});
      }
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .withFailureHandler(function() {
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .getDashboardData();
}

function showLocationStats(stats) {
  var el = document.getElementById('locationStats');
  if (!el) return;
  el.innerHTML = '';
  
  var keys = Object.keys(stats);
  if (keys.length === 0) {
    el.innerHTML = '<p class="text-muted">Belum ada data</p>';
    return;
  }
  
  keys.sort();
  for (var i = 0; i < keys.length; i++) {
    var loc = keys[i];
    var s = stats[loc];
    var p = s.total > 0 ? Math.round((s.counted / s.total) * 100) : 0;
    var cls = p >= 100 ? 'bg-success' : (p >= 50 ? 'bg-info' : 'bg-warning');
    
    el.innerHTML += '<div class="location-stat-item">'
      + '<div class="d-flex justify-content-between align-items-center">'
      + '<span class="location-name">' + loc + '</span>'
      + '<span class="text-muted">' + (s.counted || 0) + ' / ' + (s.total || 0) + '</span>'
      + '</div>'
      + '<div class="progress"><div class="progress-bar ' + cls + '" style="width:' + p + '%">' + p + '%</div></div>'
      + '<div class="d-flex gap-3 mt-1">'
      + '<small class="text-success">Match: ' + (s.match || 0) + '</small>'
      + '<small class="text-danger">Selisih: ' + (s.selisih || 0) + '</small>'
      + '</div></div>';
  }
}

function showStaffStats(stats) {
  var el = document.getElementById('staffStats');
  if (!el) return;
  el.innerHTML = '';
  
  var keys = Object.keys(stats);
  if (keys.length === 0) {
    el.innerHTML = '<p class="text-muted">Belum ada data</p>';
    return;
  }
  
  keys.sort();
  for (var i = 0; i < keys.length; i++) {
    var staff = keys[i];
    var s = stats[staff];
    var p = s.total > 0 ? Math.round((s.counted / s.total) * 100) : 0;
    var cls = p >= 100 ? 'bg-success' : (p >= 50 ? 'bg-info' : 'bg-warning');
    
    el.innerHTML += '<div class="location-stat-item">'
      + '<div class="d-flex justify-content-between align-items-center">'
      + '<span class="location-name">' + (staff || 'Unassigned') + '</span>'
      + '<span class="text-muted">' + (s.counted || 0) + ' / ' + (s.total || 0) + '</span>'
      + '</div>'
      + '<div class="progress"><div class="progress-bar ' + cls + '" style="width:' + p + '%">' + p + '%</div></div>'
      + '</div>';
  }
}

function showPage(name) {
  var pages = document.getElementsByClassName('page-content');
  for (var i = 0; i < pages.length; i++) {
    pages[i].style.display = 'none';
  }
  var target = document.getElementById('page-' + name);
  if (target) target.style.display = 'block';
  
  if (name === 'dashboard') loadDashboard();
  else if (name === 'input') loadInputItems();
  else if (name === 'allItems') loadAllItems();
  else if (name === 'assignment') loadAssignmentPage();
  else if (name === 'report') loadReport();
  else if (name === 'users') loadUsers();
}

function loadInputItems() {
  var search = document.getElementById('searchInput') ? document.getElementById('searchInput').value : '';
  var loc = document.getElementById('filterLocationInput') ? document.getElementById('filterLocationInput').value : '';
  var status = document.getElementById('filterStatusInput') ? document.getElementById('filterStatusInput').value : '';
  
  var filters = {};
  if (search) filters.search = search;
  if (loc) filters.location = loc;
  if (status) filters.status = status;
  if (!isAdmin) filters.assignedTo = currentUser;
  
  google.script.run
    .withSuccessHandler(function(items) {
      allItemsData = items || [];
      renderItems(allItemsData);
    })
    .withFailureHandler(function() {
      allItemsData = [];
      renderItems([]);
    })
    .getAllItems(filters);
}

function filterInputItems() {
  loadInputItems();
}

function renderItems(items) {
  var el = document.getElementById('inputItemsList');
  if (!el) return;
  
  if (!items || items.length === 0) {
    el.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>Tidak ada item</p></div>';
    return;
  }
  
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var sClass = item.status === 'Match' ? 'status-match' : (item.status === 'Selisih' ? 'status-selisih' : 'status-belum');
    var bClass = item.status === 'Match' ? 'badge-match' : (item.status === 'Selisih' ? 'badge-selisih' : 'badge-belum');
    
    html += '<div class="item-card ' + sClass + '" onclick="openModal(' + item.id + ')">';
    html += '<div class="d-flex justify-content-between">';
    html += '<div><div class="product-name">' + item.productName + '</div>';
    html += '<div class="product-sku">' + item.internalRef + ' | ' + item.brand + '</div></div>';
    html += '<span class="badge ' + bClass + '">' + item.status + '</span></div>';
    html += '<div class="qty-info"><span class="qty-badge qty-system">System: ' + item.qtySystem + '</span>';
    if (item.qtyFisik !== '') html += '<span class="qty-badge qty-fisik">Fisik: ' + item.qtyFisik + '</span>';
    if (item.selisih !== '') html += '<span class="qty-badge qty-selisih">Selisih: ' + item.selisih + '</span>';
    html += '</div></div>';
  }
  
  el.innerHTML = html;
}

function openModal(id) {
  var item = null;
  for (var i = 0; i < allItemsData.length; i++) {
    if (allItemsData[i].id == id) {
      item = allItemsData[i];
      break;
    }
  }
  if (!item) return;
  
  document.getElementById('modalItemId').value = item.id;
  document.getElementById('modalProductName').innerHTML = item.productName;
  document.getElementById('modalSKU').innerHTML = item.internalRef;
  document.getElementById('modalQtySystem').innerHTML = item.qtySystem;
  document.getElementById('modalQtyFisik').value = item.qtyFisik || '';
  document.getElementById('modalKeterangan').value = '';
  document.getElementById('modalKeteranganText').value = '';
  
  new bootstrap.Modal(document.getElementById('inputModal')).show();
}

function submitItemCount() {
  var itemId = document.getElementById('modalItemId').value;
  var qty = parseInt(document.getElementById('modalQtyFisik').value);
  var ket1 = document.getElementById('modalKeterangan').value;
  var ket2 = document.getElementById('modalKeteranganText').value;
  var keterangan = ket1 + (ket2 ? ' - ' + ket2 : '');
  
  if (isNaN(qty) || qty < 0) {
    alert('Qty harus angka >= 0');
    return;
  }
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('loadingOverlay').style.display = 'none';
      
      if (result && result.error) {
        alert('Error: ' + result.error);
        return;
      }
      
      var modalEl = document.getElementById('inputModal');
      var modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
      
      loadInputItems();
      alert('Berhasil! Selisih: ' + result.selisih);
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert('Error: ' + err.message);
    })
    .submitCount(parseInt(itemId), qty, keterangan);
}

function loadAllItems() {
  var loc = document.getElementById('filterAllLocation') ? document.getElementById('filterAllLocation').value : '';
  var brand = document.getElementById('filterAllBrand') ? document.getElementById('filterAllBrand').value : '';
  var cat = document.getElementById('filterAllCategory') ? document.getElementById('filterAllCategory').value : '';
  var status = document.getElementById('filterAllStatus') ? document.getElementById('filterAllStatus').value : '';
  var search = document.getElementById('searchAll') ? document.getElementById('searchAll').value : '';
  
  var filters = {};
  if (loc) filters.location = loc;
  if (brand) filters.brand = brand;
  if (cat) filters.category = cat;
  if (status) filters.status = status;
  if (search) filters.search = search;
  
  google.script.run
    .withSuccessHandler(function(items) {
      allItemsData = items || [];
      renderAllTable(allItemsData);
    })
    .withFailureHandler(function() {
      allItemsData = [];
      renderAllTable([]);
    })
    .getAllItems(filters);
}

function renderAllTable(items) {
  var tbody = document.getElementById('allItemsBody');
  if (!tbody) return;
  
  if (!items || items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11" class="text-center">Tidak ada data</td></tr>';
    return;
  }
  
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var rowCls = item.status === 'Selisih' ? 'table-selisih' : (item.status === 'Match' ? 'table-match' : '');
    var bCls = item.status === 'Match' ? 'badge-match' : (item.status === 'Selisih' ? 'badge-selisih' : 'badge-belum');
    
    html += '<tr class="' + rowCls + '">';
    html += '<td>' + item.id + '</td>';
    html += '<td>' + item.location + '</td>';
    html += '<td>' + (item.productName.length > 30 ? item.productName.substring(0, 30) + '...' : item.productName) + '</td>';
    html += '<td>' + item.internalRef + '</td>';
    html += '<td>' + item.brand + '</td>';
    html += '<td>' + item.qtySystem + '</td>';
    html += '<td>' + (item.qtyFisik !== '' ? item.qtyFisik : '-') + '</td>';
    html += '<td>' + (item.selisih !== '' ? item.selisih : '-') + '</td>';
    html += '<td><span class="badge ' + bCls + '">' + item.status + '</span></td>';
    html += '<td>' + (item.assignedTo ? item.assignedTo.substring(0, 15) : '') + '</td>';
    html += '<td><button class="btn btn-sm btn-primary" type="button" aria-label="Edit" onclick="openModal(' + item.id + ')"><i class="bi bi-pencil"></i></button></td>';
    html += '</tr>';
  }
  
  tbody.innerHTML = html;
}

function exportCurrentView() {
  var loc = document.getElementById('filterAllLocation') ? document.getElementById('filterAllLocation').value : '';
  var brand = document.getElementById('filterAllBrand') ? document.getElementById('filterAllBrand').value : '';
  var cat = document.getElementById('filterAllCategory') ? document.getElementById('filterAllCategory').value : '';
  var status = document.getElementById('filterAllStatus') ? document.getElementById('filterAllStatus').value : '';
  
  var filters = {};
  if (loc) filters.location = loc;
  if (brand) filters.brand = brand;
  if (cat) filters.category = cat;
  if (status) filters.status = status;
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(csv) {
      document.getElementById('loadingOverlay').style.display = 'none';
      var blob = new Blob([csv], { type: 'text/csv' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'stock-opname.csv';
      a.click();
    })
    .withFailureHandler(function() {
      document.getElementById('loadingOverlay').style.display = 'none';
    })
    .exportToCSV(filters);
}

function loadAssignmentPage() {
  google.script.run
    .withSuccessHandler(function(users) {
      var sel = document.getElementById('assignStaff');
      if (sel) {
        sel.innerHTML = '<option value="">-- Pilih Staff --</option>';
        if (users) {
          for (var i = 0; i < users.length; i++) {
            if (users[i].role === 'Staff' && users[i].status === 'Active') {
              sel.innerHTML += '<option value="' + users[i].email + '">' + users[i].name + '</option>';
            }
          }
        }
      }
    })
    .getUsers();
  
  updateAssignFilter();
  loadAssignments();
}

function updateAssignFilter() {
  var type = document.getElementById('assignFilterType') ? document.getElementById('assignFilterType').value : 'Location';
  var sel = document.getElementById('assignFilterValue');
  if (!sel) return;
  
  sel.innerHTML = '';
  google.script.run
    .withSuccessHandler(function(opts) {
      var items = [];
      if (type === 'Location') items = opts.locations || [];
      else if (type === 'Brand') items = opts.brands || [];
      else if (type === 'Category') items = opts.categories || [];
      else items = ['all'];
      
      for (var i = 0; i < items.length; i++) {
        sel.innerHTML += '<option value="' + items[i] + '">' + items[i] + '</option>';
      }
    })
    .getFilterOptions();
}

function loadAssignments() {
  google.script.run
    .withSuccessHandler(function(list) {
      var el = document.getElementById('assignmentsList');
      if (!el) return;
      
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="text-muted">Belum ada assignment</p>';
        return;
      }
      
      var html = '';
      for (var i = 0; i < list.length; i++) {
        var a = list[i];
        if (a.status !== 'Active') continue;
        html += '<div class="assignment-card">';
        html += '<div class="d-flex justify-content-between">';
        html += '<div><strong>' + a.userEmail + '</strong><br>';
        html += '<small>' + a.filterType + ': ' + a.filterValue + '</small></div>';
        html += '<button class="btn btn-sm btn-danger" type="button" aria-label="Hapus assignment" onclick="removeAssign(\'' + a.id + '\')"><i class="bi bi-trash"></i></button>';
        html += '</div></div>';
      }
      
      el.innerHTML = html || '<p class="text-muted">Belum ada assignment aktif</p>';
    })
    .getAssignments();
}

function createAssignment() {
  var email = document.getElementById('assignStaff') ? document.getElementById('assignStaff').value : '';
  var type = document.getElementById('assignFilterType') ? document.getElementById('assignFilterType').value : '';
  var value = document.getElementById('assignFilterValue') ? document.getElementById('assignFilterValue').value : '';
  
  if (!email) { alert('Pilih staff'); return; }
  if (!value) { alert('Pilih value'); return; }
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('loadingOverlay').style.display = 'none';
      if (result && result.error) {
        alert('Error: ' + result.error);
      } else {
        alert('Berhasil! ' + result.assignedCount + ' item di-assign');
        loadAssignments();
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert('Error: ' + err.message);
    })
    .assignItems(email, type, value);
}

function removeAssign(id) {
  if (!confirm('Hapus assignment?')) return;
  
  google.script.run
    .withSuccessHandler(function() {
      alert('Berhasil dihapus');
      loadAssignments();
    })
    .removeAssignment(id);
}

function loadReport() {
  var loc = document.getElementById('reportLocation') ? document.getElementById('reportLocation').value : '';
  var brand = document.getElementById('reportBrand') ? document.getElementById('reportBrand').value : '';
  var cat = document.getElementById('reportCategory') ? document.getElementById('reportCategory').value : '';
  var status = document.getElementById('reportStatus') ? document.getElementById('reportStatus').value : '';
  
  var filters = {};
  if (loc) filters.location = loc;
  if (brand) filters.brand = brand;
  if (cat) filters.category = cat;
  if (status) filters.status = status;
  
  google.script.run
    .withSuccessHandler(function(report) {
      if (!report) return;
      
      document.getElementById('reportTotalSystem').innerHTML = report.totalQtySystem || 0;
      document.getElementById('reportTotalFisik').innerHTML = report.totalQtyFisik || 0;
      document.getElementById('reportTotalSelisih').innerHTML = report.totalSelisih || 0;
      
      var tbody = document.getElementById('reportBody');
      if (!tbody) return;
      
      var items = report.items || [];
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center">Belum ada data</td></tr>';
        return;
      }
      
      var html = '';
      var matchCount = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var rowCls = item.selisih !== 0 ? 'table-selisih' : 'table-match';
        if (item.selisih === 0) matchCount++;
        
        html += '<tr class="' + rowCls + '">';
        html += '<td>' + item.id + '</td>';
        html += '<td>' + item.location + '</td>';
        html += '<td>' + (item.productName.length > 30 ? item.productName.substring(0, 30) + '...' : item.productName) + '</td>';
        html += '<td>' + item.internalRef + '</td>';
        html += '<td>' + item.brand + '</td>';
        html += '<td>' + item.qtySystem + '</td>';
        html += '<td>' + item.qtyFisik + '</td>';
        html += '<td>' + item.selisih + '</td>';
        html += '<td>' + (item.keterangan || '-') + '</td>';
        html += '<td>' + (item.inputter || '-') + '</td>';
        html += '</tr>';
      }
      
      tbody.innerHTML = html;
      
      var matchEl = document.getElementById('reportMatchCount');
      if (matchEl) matchEl.innerHTML = matchCount;
    })
    .getReconciliationReport(filters);
}

function exportReport() {
  var loc = document.getElementById('reportLocation') ? document.getElementById('reportLocation').value : '';
  var brand = document.getElementById('reportBrand') ? document.getElementById('reportBrand').value : '';
  var cat = document.getElementById('reportCategory') ? document.getElementById('reportCategory').value : '';
  var status = document.getElementById('reportStatus') ? document.getElementById('reportStatus').value : '';
  
  var filters = {};
  if (loc) filters.location = loc;
  if (brand) filters.brand = brand;
  if (cat) filters.category = cat;
  if (status) filters.status = status;
  
  google.script.run
    .withSuccessHandler(function(csv) {
      var blob = new Blob([csv], { type: 'text/csv' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'laporan-stock-opname.csv';
      a.click();
    })
    .exportToCSV(filters);
}

function loadUsers() {
  google.script.run
    .withSuccessHandler(function(users) {
      var el = document.getElementById('usersList');
      if (!el) return;
      
      if (!users || users.length === 0) {
        el.innerHTML = '<p class="text-muted">Belum ada user</p>';
        return;
      }
      
      var html = '';
      for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var badge = u.status === 'Active' ? 'bg-success' : 'bg-secondary';
        
        html += '<div class="user-card">';
        html += '<div class="user-info">';
        html += '<div class="user-name">' + u.name + '</div>';
        html += '<div class="user-email">' + u.email + '</div>';
        html += '<span class="badge bg-primary">' + u.role + '</span> ';
        html += '<span class="badge ' + badge + '">' + u.status + '</span>';
        html += '</div>';
        html += '<div>';
        if (u.status === 'Active') {
          html += '<button class="btn btn-sm btn-warning" type="button" onclick="toggleUser(\'' + u.email + '\',\'Inactive\')">Nonaktifkan</button>';
        } else {
          html += '<button class="btn btn-sm btn-success" type="button" onclick="toggleUser(\'' + u.email + '\',\'Active\')">Aktifkan</button>';
        }
        html += '</div></div>';
      }
      
      el.innerHTML = html;
    })
    .getUsers();
}

function addNewUser() {
  var email = document.getElementById('newUserEmail') ? document.getElementById('newUserEmail').value : '';
  var name = document.getElementById('newUserName') ? document.getElementById('newUserName').value : '';
  var role = document.getElementById('newUserRole') ? document.getElementById('newUserRole').value : 'Staff';
  
  if (!email || !name) { alert('Email dan Nama harus diisi'); return; }
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('loadingOverlay').style.display = 'none';
      if (result && result.error) {
        alert('Error: ' + result.error);
      } else {
        alert('User berhasil ditambahkan!');
        document.getElementById('newUserEmail').value = '';
        document.getElementById('newUserName').value = '';
        loadUsers();
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert('Error: ' + err.message);
    })
    .addUser(email, name, role);
}

function toggleUser(email, status) {
  var action = status === 'Active' ? 'mengaktifkan' : 'menonaktifkan';
  if (!confirm('Yakin ' + action + ' user ' + email + '?')) return;
  
  google.script.run
    .withSuccessHandler(function() {
      alert('Berhasil!');
      loadUsers();
    })
    .updateUserStatus(email, status);
}

function parseCSV() {
  if (!confirm('Parse CSV dari sheet Import?')) return;
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('loadingOverlay').style.display = 'none';
      var el = document.getElementById('importResult');
      if (result && result.error) {
        el.innerHTML = '<div class="alert alert-danger">' + result.error + '</div>';
      } else {
        el.innerHTML = '<div class="alert alert-success">Berhasil! ' + result.count + ' item di-import</div>';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('importResult').innerHTML = '<div class="alert alert-danger">Error: ' + err.message + '</div>';
    })
    .parseCSVFromSheet();
}

function initializeAllSheets() {
  if (!confirm('Initialize semua sheets?')) return;
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert(result);
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert('Error: ' + err.message);
    })
    .initializeSheets();
}

function confirmReset() {
  if (!confirm('HAPUS SEMUA DATA?')) return;
  if (!confirm('YAKIN? Data tidak bisa dikembalikan!')) return;
  
  google.script.run
    .withSuccessHandler(function() {
      alert('Data berhasil di-reset');
      loadDashboard();
    })
    .resetAllData();
}

function confirmClearAssignments() {
  if (!confirm('Hapus semua assignment?')) return;
  
  google.script.run
    .withSuccessHandler(function() {
      alert('Assignment berhasil dihapus');
    })
    .clearAllAssignments();
}
</script>
